<body>
    <div id="game-div">
        <h1>Rock Paper Scissors</h1>
        <h3 id="score">Human 0:0 Computer</h3>

    <div id="buttons-div">
        <button id="rock"><input type="image" src="hand.png"></image></button>
        <button id="paper"><input type="image" src="hand-paper.png"></image></button>
        <button id="scissors"><input type="image" src="scissors.png"></image></button>
    </div>
    <script>
        function getComputerChoice() {
            let random = Math.floor(Math.random() * 3);
            // Rock: 0  Paper: 1    Scissors: 2
            switch (random) {
                case 0:
                    return "rock";
                case 1:
                    return "paper";
                case 2:
                    return "scissors";
            }
        }

        function getHumanChoice(){
            vaildChoice = false;
            let choice;

            while (!vaildChoice)
            {
                choice = prompt("Please choose 'rock', 'paper' or 'scissors'");
                if (choice.toLowerCase() === 'rock' || choice.toLowerCase() === 'paper' || choice.toLowerCase() === 'scissors')
                {
                    vaildChoice = true;
                }
                else {
                    alert("Invalid choice");
                }
            }

            return choice.toLowerCase();
        }

        function playRound(humanChoice, computerChoice, humanScore, computerScore, outcomeText) {
            outcomeText.textContent = `You have chosen ${humanChoice} whilst Computer has picked ${computerChoice}`;

            if (humanChoice === computerChoice) {
                outcomeText.textContent += ' - The Round is a Draw'
            }
            else if ((humanChoice === 'rock') && (computerChoice === 'scissors') || (humanChoice === 'paper') && (computerChoice === 'rock') || (humanChoice === 'scissors') && (computerChoice === 'paper')) {
                outcomeText.textContent += ' - You have won the round'
                return "human"
            }
            else {
                outcomeText.textContent += ' - Computer has won the round'
                return "computer";
            }
        }

        function endGame() {
            const container = document.querySelector('#buttons-div');

            container.querySelectorAll('button').forEach(button => {
                button.style.display = 'none';
            });

            let restartButton = document.querySelector('#restart-btn')

            if (!restartButton) {
                restartButton = document.createElement('button');
                restartButton.id = 'restart-btn';
                restartButton.textContent = 'Restart';

                const gameDiv = document.querySelector('#game-div')
                gameDiv.after(restartButton);

                restartButton.addEventListener('click', () => {
                    restartButton.style.display = 'none';
                    container.querySelectorAll('button').forEach(button => {
                        button.style.display = '';
                    });
                    playGame();
                });
            }
            restartButton.style.display = '';
        }

            // else {
            //     console.log("The game ends in a draw")

        }

        let humanScore = 0;
        let computerScore = 0;

        const container = document.querySelector('#buttons-div');
        const buttons = container.querySelectorAll('button');
        const displayedScore = document.querySelector('#score');
        const outcomeText = document.querySelector('#outcome');

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                const humanChoice = button.id;
                const roundWinner = playRound(humanChoice, getComputerChoice(), humanScore, computerScore, outcomeText);

                if (roundWinner === "human") {
                    humanScore++;
                }
                else if (roundWinner === "computer") {
                    computerScore++;
                };

                displayedScore.textContent = `Human ${humanScore}:${computerScore} Computer`;

                if (humanScore === 5 || computerScore === 5) {
                    outcomeText.textContent = humanScore === 5
                        ? 'You have won the game!'
                        : 'Computer has won the game!';
                    endGame();
                }
            });
        });
