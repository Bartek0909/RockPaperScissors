<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="shortcut icon" type="image/png" href="demo.png"/>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function getComputerChoice() {
            let random = Math.floor(Math.random() * 3);
            // Rock: 0  Paper: 1    Scissors: 2
            switch (random) {
                case 0:
                    return "rock";
                case 1:
                    return "paper";
                case 2:
                    return "scissors";
            }
        }

        function getHumanChoice(){
            vaildChoice = false;
            let choice;

            while (!vaildChoice)
            {
                choice = prompt("Please choose 'rock', 'paper' or 'scissors'");
                if (choice.toLowerCase() === 'rock' || choice.toLowerCase() === 'paper' || choice.toLowerCase() === 'scissors')
                {
                    vaildChoice = true;
                }
                else {
                    alert("Invalid choice");
                }
            }

            return choice.toLowerCase();
        }

        function playRound(humanChoice, computerChoice, humanScore, computerScore) {

            console.log(`Player chooses: ${humanChoice}`);
            console.log(`Computer chooses: ${computerChoice}`);

            if (humanChoice === computerChoice) {
                console.log("The round is a draw!");
            }
            else if ((humanChoice === 'rock') && (computerChoice === 'scissors') || (humanChoice === 'paper') && (computerChoice === 'rock') || (humanChoice === 'scissors') && (computerChoice === 'paper')) {
                console.log("Human wins the round");
                return "human"
            }
            else {
                console.log("Computer wins the round");
                return "computer";
            }
        }

        function playGame() {

            let humanScore = 0;
            let computerScore = 0;

            let roundsPlayed = 0;

            while (roundsPlayed < 5) {
                const humanChoice = getHumanChoice();
                const computerChoice = getComputerChoice();

                let roundWinner = playRound(humanChoice, computerChoice, humanScore, computerScore);
                roundsPlayed++;

                if (roundWinner === "human") {humanScore++;}
                else if (roundWinner === "computer") {computerScore++;}

                console.log(`Current score: Player ${humanScore}:${computerScore} Computer`); 
            }

            if (humanScore > computerScore) {
                console.log("The winner is player!");
            }
            else if (computerScore > humanScore) {
                console.log("The winner is computer!");
            }
            else {
                console.log("The game ends in a draw")
            }
        }

        playGame();
        
    </script>
</body>
</html>
